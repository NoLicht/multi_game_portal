{% extends "database/base.html" %}

{% block title %}新しいパスワード{% endblock %}

{% block content %}
<div class="register-form">
  <h2 class="form-title">新しいパスワードを入力</h2>

  {% if validlink %}
  <form method="post">
    {% csrf_token %}

    <div class="form-group">
      <input type="password" name="new_password1" required placeholder="新しいパスワード">
    </div>
    <div class="form-group">
      <input type="password" name="new_password2" required placeholder="新しいパスワード（確認）">
    </div>

    <button type="submit" class="submit-btn">変更する</button>
  </form>
  {% else %}
  <p style="text-align:center; color:red;">リンクが無効です。再度パスワード再設定を行ってください。</p>
  <p class="login-link"><a href="{% url 'password_reset' %}">パスワード再設定ページへ</a></p>
  {% endif %}
</div>
{% endblock %}
