{% load static %}
<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}攻略サイト{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'database/css/style.css' %}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    {% block head_extra %}{% endblock %}
</head>

<body>
<header class="navbar navbar-expand-lg fixed-top shadow-sm" style="background: linear-gradient(180deg, #222 85%, #ffcc00 100%);">
    <div class="container-fluid">
        <!-- ロゴ文字を白に -->
        <a class="navbar-brand fw-bold text-white" href="{% url 'database:home' %}">🎮 マルチ攻略データベース</a>
        <div class="d-flex">
            {% if user.is_authenticated %}
            <form method="post" action="{% url 'database:logout' %}" class="d-inline">
                {% csrf_token %}
                <button type="submit" class="auth-btn me-2">ログアウト</button>
            </form>
            {% else %}
            <a class="auth-btn me-2" href="{% url 'database:login' %}">ログイン</a>
            <a class="auth-btn me-2" href="{% url 'database:signup' %}">新規登録</a>
            {% endif %}
            
            <!-- 問い合わせボタン -->
            <a class="auth-btn me-2" href="{% url 'database:contact' %}">問い合わせ</a>
        </div>
    </div>
</header>

<main class="container" style="margin-top: 90px;">
    {% block content %}{% endblock %}
</main>



<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
