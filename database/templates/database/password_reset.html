{% extends "database/base.html" %}
{% load static %}

{% block title %}パスワード再設定{% endblock %}

{% block content %}
<div class="register-form">
  <h2 class="form-title">パスワード再設定</h2>

  <form method="post">
    {% csrf_token %}

    <div class="form-group">
      <input type="email" name="email" required placeholder="登録メールアドレス">
      <label>パスワード再設定用のリンクをメールで送信します。</label>
    </div>

    <button type="submit" class="submit-btn">送信</button>

    <p class="login-link">
      <a href="{% url 'database:login' %}">ログイン画面へ戻る</a>
    </p>
  </form>
</div>
{% endblock %}
