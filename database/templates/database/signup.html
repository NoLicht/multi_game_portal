{% extends "database/base.html" %}
{% load static %}

{% block title %}新規登録{% endblock %}

{% block content %}
<div class="register-form">
  <h2 class="form-title">新規登録</h2>

  <form method="post">
    {% csrf_token %}

    <div class="form-group">
      <input type="text" id="username" name="username" required placeholder="ユーザー名">
      <label>必須：半角英数字、@./+/-/_ で150文字以内</label>
    </div>

    <div class="form-group">
      <input type="email" id="email" name="email" placeholder="メールアドレス">
    </div>

    <div class="form-group">
      <input type="password" id="password1" name="password1" placeholder="パスワード">
    </div>

    <div class="form-group">
      <input type="password" id="password2" name="password2" placeholder="パスワード（確認）">
      <label>確認のため再度パスワードを入力してください</label>
    </div>

    <button type="submit" class="submit-btn">登録</button>

    <p class="login-link">
      すでにアカウントをお持ちですか？ <a href="{% url 'database:login' %}">ログイン</a>
    </p>
  </form>
</div>
{% endblock %}
