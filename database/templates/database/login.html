{% extends 'database/base.html' %}
{% load static %}

{% block title %}ログイン{% endblock %}

{% block content %}
<div class="register-form">
  <h2 class="form-title">ログイン</h2>

  <form method="post" action="{% url 'database:login' %}">
    {% csrf_token %}

    <div class="form-group">
      <input type="text" id="username" name="username" required placeholder="ユーザー名">
    </div>

    <div class="form-group">
      <input type="password" id="password" name="password" required placeholder="パスワード">
    </div>

    <div class="forgot-password">
      <a href="{% url 'database:password_reset' %}">パスワードを忘れた場合はこちら</a>
    </div>

    <button type="submit" class="submit-btn">ログイン</button>

    {% if error %}
      <div class="error-msg">{{ error }}</div>
    {% endif %}

    <p class="signup-link">
      アカウントをお持ちでないですか？ <a href="{% url 'database:signup' %}">新規登録</a>
    </p>
  </form>
</div>
{% endblock %}
